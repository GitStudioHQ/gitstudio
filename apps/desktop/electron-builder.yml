appId: dev.gitstudio.desktop
productName: GitStudio
copyright: Copyright © GitStudio. Licensed under Apache-2.0.

# In an npm-workspaces repo `electron` is hoisted to the root node_modules, so
# electron-builder can't infer the version from the local package tree; pin it
# explicitly (kept in step with the devDependency in package.json).
electronVersion: 33.4.11

# node-pty ships N-API prebuilds that already load in Electron's ABI, so DON'T
# let electron-builder rebuild native modules from source (node-gyp needs Python
# distutils, removed in 3.12, and the rebuild fails the whole package).
npmRebuild: false

# Only the built bundles + the page shell ship; sources stay out of the app.
# Sourcemaps are dev-only — never ship them (they bloat the app by ~20MB and
# leak source). A production esbuild run doesn't emit them, but exclude defensively
# so a stale dev `.map` left in dist/ can never end up in a shipped build.
files:
  - dist/**
  - "!dist/**/*.map"
  - package.json

# node-pty is a native module (the integrated terminal's PTY). Its prebuilt
# `.node` binary CANNOT load from inside the asar, so unpack it.
asarUnpack:
  - "**/node_modules/node-pty/**"

directories:
  output: release
  buildResources: build

# Auto-update feed (no-op until the first app-v* release publishes installers).
publish:
  provider: github
  owner: GitStudioHQ
  repo: gitstudio

# A single ≥512px PNG in buildResources (build/icon.png); electron-builder
# converts it to .icns / .ico per platform automatically.
mac:
  category: public.app-category.developer-tools
  # dmg is the human download; zip is REQUIRED for electron-updater to deliver
  # macOS auto-updates (it can't update from a .dmg).
  target:
    - dmg
    - zip
  # Include the arch so the Apple-Silicon and Intel builds (built natively on
  # separate runners) don't clobber each other's assets on the Release.
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  title: GitStudio ${version}

win:
  target:
    - nsis
  # No spaces (the nsis default is "GitStudio Setup 1.0.0.exe"): GitHub asset
  # names replace spaces with dots while electron-updater requests them with
  # dashes — a guaranteed 404. Dashes also give the website stable download URLs.
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  category: Development
  # AppImage = the universal, distro-agnostic download; deb = native install for
  # Debian/Ubuntu/Mint (the largest Linux desktop share).
  target:
    - AppImage
    - deb
  # Pinned so the website can link GitStudio-<version>-<arch>.AppImage forever.
  artifactName: ${productName}-${version}-${arch}.${ext}
  maintainer: GitStudio <hello@gitstudio.dev>
  synopsis: A free, open-source, JetBrains-grade Git suite for your desktop.

deb:
  priority: optional
