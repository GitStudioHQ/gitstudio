<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Locked-down CSP for the desktop renderer. No remote code: scripts/styles
      are the bundled, same-origin assets; Monaco needs blob: workers and data:
      fonts. The renderer has NO Node access (contextIsolation on); all host
      power comes through the preload's `window.gitstudio` bridge.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; worker-src 'self' blob:; connect-src 'self'"
    />
    <link rel="stylesheet" href="./renderer.css" />
    <title>GitStudio</title>
  </head>
  <body>
    <script>
      // Pick the theme class before first paint so a light-OS launch doesn't
      // flash the dark canvas. desktopTheme re-affirms this and tracks live
      // OS theme changes once the renderer boots.
      document.body.className =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: light)").matches
          ? "vscode-light"
          : "vscode-dark";
    </script>
    <div id="root">
      <div id="boot">Loading GitStudio…</div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
