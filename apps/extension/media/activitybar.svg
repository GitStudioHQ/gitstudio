<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- GitStudio activity-bar mark: the commit-cube silhouette + a graph node/lane,
       derived from the brand mark. currentColor so VS Code themes it on dark,
       light, and high-contrast (the activity bar masks the icon to the fg color). -->
